<ul class="nav nav-tabs" role="tablist">
  {% for tab in settings_tabs %}
    <li class="nav-item">
      <a class="nav-link {% if active_tab == tab.tab_id %}active{% endif %}" href="{% url 'settings' %}?tab={{ tab.tab_id }}" data-toggle="tab" data-target="#{{ tab.tab_id }}" data-settings-tab="{{ tab.tab_id }}" role="tab">{{ tab.label }}</a>
    </li>
  {% endfor %}
</ul>
